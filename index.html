<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>כוננות ותגבורים</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;color:#1a2233;min-height:100vh}
header{background:linear-gradient(135deg,#2563eb,#1e40af);color:white;padding:20px 28px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 16px #1e40af44}
header h1{font-size:1.4rem;font-weight:700}
header span{font-size:0.85rem;opacity:0.8}
.sync-status{font-size:0.78rem;padding:4px 10px;border-radius:20px;font-weight:600}
.sync-ok{background:rgba(34,197,94,0.2);color:#86efac}
.sync-err{background:rgba(239,68,68,0.2);color:#fca5a5}
.sync-loading{background:rgba(255,255,255,0.15);color:white}
.tabs{display:flex;background:white;border-bottom:2px solid #e5e9f0;padding:0 20px;gap:2px}
.tab{padding:13px 20px;cursor:pointer;font-weight:600;font-size:0.93rem;color:#64748b;border-bottom:3px solid transparent;transition:all .2s;margin-bottom:-2px;white-space:nowrap}
.tab.active{color:#2563eb;border-bottom-color:#2563eb}
.tab:hover:not(.active){color:#334155;background:#f8fafc}
.container{max-width:1100px;margin:0 auto;padding:24px 18px}
.card{background:white;border-radius:14px;box-shadow:0 2px 12px #0001;padding:26px 28px;margin-bottom:22px}
.card h2{font-size:1.1rem;margin-bottom:18px;color:#1e40af}
.form-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px}
.form-group{display:flex;flex-direction:column;flex:1;min-width:150px}
.form-group label{font-size:0.78rem;font-weight:700;color:#64748b;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.form-group select,.form-group input,.form-group textarea{border:1.5px solid #e2e8f0;border-radius:8px;padding:9px 11px;font-size:0.93rem;color:#1a2233;background:#f8fafc;font-family:inherit;transition:border-color .2s}
.form-group select:focus,.form-group input:focus,.form-group textarea:focus{outline:none;border-color:#2563eb;background:white}
.form-group textarea{resize:vertical;min-height:68px}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:9px;margin-bottom:22px}
.day-card{border:1.5px solid #e2e8f0;border-radius:10px;padding:11px 7px;background:#f8fafc;transition:border-color .2s,box-shadow .2s}
.day-card:hover{border-color:#93c5fd;box-shadow:0 2px 8px #2563eb11}
.day-name{text-align:center;font-weight:700;font-size:0.79rem;color:#475569;margin-bottom:1px}
.day-date{text-align:center;font-size:0.72rem;color:#94a3b8;margin-bottom:9px}
.shift-section{margin-bottom:7px}
.shift-label{font-size:0.69rem;font-weight:700;letter-spacing:.3px;margin-bottom:3px;padding:2px 5px;border-radius:4px;display:inline-block}
.sl-k{background:#dbeafe;color:#1d4ed8}.sl-t{background:#dcfce7;color:#15803d}
.btn-group{display:flex;flex-direction:column;gap:3px}
.sb{border:1.5px solid #e2e8f0;border-radius:6px;padding:5px 3px;font-size:0.68rem;font-weight:600;cursor:pointer;background:white;color:#64748b;transition:all .15s;text-align:center;font-family:inherit}
.sb:hover{border-color:#93c5fd;color:#1d4ed8;background:#eff6ff}
.sb.s1{background:#2563eb;color:white;border-color:#2563eb}
.sb.s2{background:#7c3aed;color:white;border-color:#7c3aed}
.sb.sno{background:#ef4444;color:white;border-color:#ef4444}
.sb.st{background:#16a34a;color:white;border-color:#16a34a}
.submit-btn{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:white;border:none;border-radius:10px;padding:12px 26px;font-size:0.95rem;font-weight:700;cursor:pointer;font-family:inherit;transition:transform .15s,box-shadow .15s;display:flex;align-items:center;gap:8px}
.submit-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px #2563eb44}
.submit-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.btn-secondary{background:white;border:1.5px solid #e2e8f0;border-radius:10px;padding:12px 16px;cursor:pointer;font-size:0.88rem;font-weight:600;color:#64748b;font-family:inherit}
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filters label{font-weight:600;font-size:0.83rem;color:#64748b}
.filters select{border:1.5px solid #e2e8f0;border-radius:8px;padding:7px 11px;font-size:0.85rem;background:white;color:#1a2233;font-family:inherit}
.export-group{margin-right:auto;display:flex;gap:6px}
.export-btn{background:white;border:1.5px solid #e2e8f0;border-radius:8px;padding:7px 13px;cursor:pointer;font-size:0.82rem;font-weight:600;color:#475569;font-family:inherit;transition:all .2s}
.export-btn:hover{border-color:#2563eb;color:#2563eb}
.export-btn.excel{background:#16783a;color:white;border-color:#16783a}
.export-btn.excel:hover{background:#135f2f}
.refresh-btn{background:white;border:1.5px solid #bfdbfe;border-radius:8px;padding:7px 13px;cursor:pointer;font-size:0.82rem;font-weight:600;color:#2563eb;font-family:inherit}
.summary-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.chip{background:white;border-radius:10px;padding:9px 14px;box-shadow:0 1px 6px #0001;display:flex;align-items:center;gap:7px;font-size:0.83rem}
.chip .num{font-size:1.25rem;font-weight:800;color:#2563eb}
.chip .lbl{color:#64748b;font-weight:500}
.schedule-table{width:100%;border-collapse:collapse;background:white;border-radius:0 0 12px 12px;overflow:hidden;font-size:0.84rem}
.schedule-table th{background:#1e40af;color:white;padding:10px 7px;font-weight:700;font-size:0.77rem;text-align:center}
.schedule-table td{padding:8px 7px;border:1px solid #e2e8f0;text-align:center;vertical-align:middle}
.schedule-table tr:nth-child(4n+1) td,.schedule-table tr:nth-child(4n+2) td{background:#f8fafc}
.person-cell{font-weight:700;font-size:0.88rem;border-right:4px solid #2563eb !important}
.type-cell{font-size:0.72rem;color:#94a3b8;font-style:italic}
.badge{display:inline-block;padding:3px 7px;border-radius:20px;font-size:0.7rem;font-weight:700;white-space:nowrap}
.b1{background:#dbeafe;color:#1d4ed8}.b2{background:#ede9fe;color:#6d28d9}
.bno{background:#fee2e2;color:#b91c1c}.bt{background:#dcfce7;color:#15803d}
.be{background:#f1f5f9;color:#cbd5e1}
.week-block{margin-bottom:28px}
.week-title{background:#1e40af;color:white;border-radius:10px 10px 0 0;padding:11px 18px;font-weight:700;font-size:0.93rem;display:flex;align-items:center;justify-content:space-between}
.empty-state{text-align:center;padding:44px 24px;color:#94a3b8}
.empty-state .icon{font-size:2.8rem;margin-bottom:10px}
.loading-overlay{text-align:center;padding:40px;color:#64748b;font-size:0.95rem}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid #e2e8f0;border-top-color:#2563eb;border-radius:50%;animation:spin .7s linear infinite;margin-left:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
/* emp manager */
.emp-manager{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:12px;padding:18px 20px}
.emp-manager h3{font-size:0.9rem;font-weight:700;color:#475569;margin-bottom:14px}
.emp-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.emp-tag{display:flex;align-items:center;gap:6px;background:white;border:1.5px solid #bfdbfe;border-radius:20px;padding:5px 12px 5px 8px;font-size:0.85rem;font-weight:600;color:#1d4ed8}
.emp-tag .del-btn{cursor:pointer;color:#94a3b8;font-size:1rem;line-height:1;transition:color .15s;background:none;border:none;padding:0;font-family:inherit}
.emp-tag .del-btn:hover{color:#ef4444}
.add-emp-row{display:flex;gap:8px;align-items:center}
.add-emp-input{border:1.5px solid #e2e8f0;border-radius:8px;padding:8px 12px;font-size:0.9rem;background:white;color:#1a2233;font-family:inherit;flex:1}
.add-emp-input:focus{outline:none;border-color:#2563eb}
.add-emp-btn{background:#2563eb;color:white;border:none;border-radius:8px;padding:8px 16px;font-size:0.88rem;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
/* modal */
.modal-overlay{position:fixed;inset:0;background:#0006;display:flex;align-items:center;justify-content:center;z-index:500;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:white;border-radius:16px;padding:28px;width:90%;max-width:380px;box-shadow:0 20px 60px #0003;transform:translateY(10px);transition:transform .2s}
.modal-overlay.open .modal{transform:none}
.modal h3{font-size:1.05rem;font-weight:700;color:#1e40af;margin-bottom:8px}
.modal p{font-size:0.88rem;color:#64748b;margin-bottom:20px}
.modal-btns{display:flex;gap:10px;justify-content:flex-end}
.modal-btns button{border-radius:8px;padding:9px 20px;font-size:0.88rem;font-weight:600;cursor:pointer;font-family:inherit;border:none}
.btn-cancel{background:#f1f5f9;color:#475569}
.btn-danger{background:#ef4444;color:white}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);color:white;padding:13px 26px;border-radius:12px;font-weight:600;font-size:0.92rem;box-shadow:0 8px 24px #0002;transition:transform .3s;z-index:999}
.toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:700px){.days-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:460px){.days-grid{grid-template-columns:repeat(2,1fr)}.tabs .tab{padding:11px 12px;font-size:0.82rem}}
</style>
</head>
<body>

<header>
  <div>
    <h1>📋 כוננות ותגבורים</h1>
    <span>מערכת בקשות סידור עבודה</span>
  </div>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
    <div id="hdr" style="font-size:0.83rem;opacity:0.85;"></div>
    <div id="syncStatus" class="sync-status sync-loading">⏳ מתחבר...</div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('form')">📝 הגשת בקשה</div>
  <div class="tab" onclick="switchTab('table')">📊 טבלת הסידור</div>
  <div class="tab" onclick="switchTab('emps')">👥 ניהול עובדים</div>
</div>

<!-- FORM -->
<div id="tab-form" class="container">
  <div class="card">
    <h2>📝 הגשת בקשה לשבוע</h2>
    <div class="form-row">
      <div class="form-group">
        <label>שם עובד/ת</label>
        <select id="empName"></select>
      </div>
      <div class="form-group">
        <label>שבוע (יום ראשון)</label>
        <input type="date" id="weekStart">
      </div>
    </div>
    <div id="daysGrid" class="days-grid"></div>
    <div class="form-group" style="margin-bottom:18px;">
      <label>הערות נוספות</label>
      <textarea id="notes" placeholder="הוסף הערות אם יש..."></textarea>
    </div>
    <div style="display:flex;gap:10px;align-items:center;">
      <button class="submit-btn" id="submitBtn" onclick="submitRequest()">
        <span>✅</span> <span>הגש בקשה</span>
      </button>
      <button class="btn-secondary" onclick="clearForm()">🗑️ נקה</button>
    </div>
  </div>
</div>

<!-- TABLE -->
<div id="tab-table" class="container" style="display:none;">
  <div class="filters">
    <label>שבוע:</label>
    <select id="filterWeek" onchange="renderTable()"><option value="">-- כל השבועות --</option></select>
    <label>עובד:</label>
    <select id="filterEmp" onchange="renderTable()"><option value="">-- כולם --</option></select>
    <button class="refresh-btn" onclick="loadFromSheet()">🔄 רענן</button>
    <div class="export-group">
      <button class="export-btn excel" onclick="exportExcel()">📊 יצא Excel</button>
      <button class="export-btn" onclick="exportCSV()">⬇️ יצא CSV</button>
    </div>
  </div>
  <div id="summaryBar" class="summary-bar"></div>
  <div id="tableArea"></div>
</div>

<!-- EMPLOYEES -->
<div id="tab-emps" class="container" style="display:none;">
  <div class="card">
    <h2>👥 ניהול רשימת העובדים</h2>
    <p style="font-size:0.88rem;color:#64748b;margin-bottom:18px;">הוסף או הסר עובדים. שינויים נשמרים לכולם.</p>
    <div class="emp-manager">
      <h3>עובדים פעילים</h3>
      <div id="empList" class="emp-list"></div>
      <div class="add-emp-row">
        <input type="text" class="add-emp-input" id="newEmpInput" placeholder="שם העובד החדש..." maxlength="30"
          onkeydown="if(event.key==='Enter')addEmployee()">
        <button class="add-emp-btn" onclick="addEmployee()">+ הוסף עובד</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <p id="modalMsg"></p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">ביטול</button>
      <button class="btn-danger" id="modalConfirm">מחק</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxthvE6VJ569Do3zCm-IhbUA8gHNxcSBLlkppu3EebpZ0vRCdpVoTlkzG7HzLjtQzc7WQ/exec';

const DAYS = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
let employees = ['חיים','ליאור','סרגיי','ענבל'];
let requests  = [];
let fd = {};
let isSaving = false;

// ── helpers ───────────────────────────────────────────────
function p2(n){return String(n).padStart(2,'0')}
function fmtD(d){return `${p2(d.getDate())}/${p2(d.getMonth()+1)}`}

// ── Google Sheets sync ────────────────────────────────────
async function loadFromSheet() {
  setSyncStatus('loading');
  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?t=${Date.now()}`, {redirect:'follow'});
    const text = await res.text();
    const idx = text.indexOf('{');
    const clean = idx >= 0 ? text.slice(idx) : '{}';
    const data = JSON.parse(clean);
    employees = data.employees || employees;
    requests  = data.requests  || [];
    populateEmpSelects();
    buildFilterWeeks();
    renderEmpList();
    if(document.getElementById('tab-table').style.display !== 'none') renderTable();
    setSyncStatus('ok');
  } catch(e) {
    setSyncStatus('error');
    showToast('⚠️ שגיאה בטעינה מגוגל שיטס', true);
  }
}

async function saveToSheet() {
  setSyncStatus('loading');
  try {
    const payload = JSON.stringify({employees, requests});
    await fetch(APPS_SCRIPT_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: payload,
      redirect:'follow'
    });
    setSyncStatus('ok');
  } catch(e) {
    setSyncStatus('error');
    showToast('⚠️ שגיאה בשמירה לגוגל שיטס', true);
  }
}

function setSyncStatus(state) {
  const el = document.getElementById('syncStatus');
  if(state==='ok'){el.className='sync-status sync-ok';el.textContent='✅ מסונכרן'}
  else if(state==='error'){el.className='sync-status sync-err';el.textContent='❌ שגיאת חיבור'}
  else{el.className='sync-status sync-loading';el.textContent='⏳ מסנכרן...'}
}

// ── init ──────────────────────────────────────────────────
window.onload = async () => {
  const d = new Date();
  d.setDate(d.getDate() + (7 - d.getDay()) % 7);
  document.getElementById('weekStart').value = d.toISOString().slice(0,10);
  document.getElementById('weekStart').addEventListener('change', buildGrid);
  populateEmpSelects();
  buildGrid();
  await loadFromSheet();
  buildGrid(); // rebuild after employees loaded
  // auto-refresh every 30 seconds
  setInterval(loadFromSheet, 30000);
};

function populateEmpSelects() {
  const sel = document.getElementById('empName');
  const cur = sel.value;
  sel.innerHTML = '<option value="">-- בחר שם --</option>' +
    employees.map(e=>`<option${e===cur?' selected':''}>${e}</option>`).join('');
  const fsel = document.getElementById('filterEmp');
  const fcur = fsel.value;
  fsel.innerHTML = '<option value="">-- כולם --</option>' +
    employees.map(e=>`<option${e===fcur?' selected':''}>${e}</option>`).join('');
}

// ── grid ──────────────────────────────────────────────────
function buildGrid() {
  fd = {};
  const ws = document.getElementById('weekStart').value;
  if (!ws) return;
  const s=new Date(ws), e=new Date(ws); e.setDate(e.getDate()+6);
  document.getElementById('hdr').textContent = `${fmtD(s)} – ${fmtD(e)}/${e.getFullYear()}`;
  const g = document.getElementById('daysGrid'); g.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const day = new Date(ws); day.setDate(day.getDate()+i);
    fd[i] = {konenut:null, tigbur:false};
    const c = document.createElement('div');
    c.className = 'day-card';
    c.innerHTML = `
      <div class="day-name">${DAYS[i]}</div>
      <div class="day-date">${fmtD(day)}</div>
      <div class="shift-section">
        <div class="shift-label sl-k">כוננות</div>
        <div class="btn-group">
          <button class="sb" onclick="setK(${i},1,this)">כונן</button>
          <button class="sb" onclick="setK(${i},2,this)">רק כונן 2</button>
          <button class="sb" onclick="setK(${i},'no',this)">לא כונן</button>
        </div>
      </div>
      <div class="shift-section" style="margin-top:7px;">
        <div class="shift-label sl-t">תגבור</div>
        <div class="btn-group">
          <button class="sb" id="tg${i}" onclick="togT(${i},this)">אפשרי</button>
        </div>
      </div>`;
    g.appendChild(c);
  }
}

function setK(i,v,btn){
  fd[i].konenut=v;
  btn.closest('.btn-group').querySelectorAll('.sb').forEach(b=>b.className='sb');
  btn.classList.add(v===1?'s1':v===2?'s2':'sno');
}
function togT(i,btn){
  fd[i].tigbur=!fd[i].tigbur;
  btn.className='sb'+(fd[i].tigbur?' st':'');
  btn.textContent=fd[i].tigbur?'✓ אפשרי':'אפשרי';
}

// ── submit ────────────────────────────────────────────────
async function submitRequest(){
  const name=document.getElementById('empName').value;
  const ws=document.getElementById('weekStart').value;
  if(!name){showToast('❗ יש לבחור שם עובד',true);return}
  if(!ws){showToast('❗ יש לבחור שבוע',true);return}

  const btn=document.getElementById('submitBtn');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span> שומר...';

  requests=requests.filter(r=>!(r.name===name&&r.weekStart===ws));
  requests.push({id:Date.now(),name,weekStart:ws,
    days:Array.from({length:7},(_,i)=>({day:i,konenut:fd[i].konenut,tigbur:fd[i].tigbur})),
    notes:document.getElementById('notes').value,
    submittedAt:new Date().toISOString()});

  await saveToSheet();
  buildFilterWeeks();
  btn.disabled=false;
  btn.innerHTML='<span>✅</span> <span>הגש בקשה</span>';
  showToast('✅ הבקשה נשמרה ועודכנה לכולם!');
}

function clearForm(){
  document.getElementById('empName').value='';
  document.getElementById('notes').value='';
  buildGrid();
}

// ── tabs ──────────────────────────────────────────────────
function switchTab(t){
  document.querySelectorAll('.tab').forEach((tab,i)=>tab.classList.toggle('active',['form','table','emps'][i]===t));
  ['form','table','emps'].forEach(id=>document.getElementById('tab-'+id).style.display=id===t?'':'none');
  if(t==='table'){buildFilterWeeks();renderTable()}
  if(t==='emps')renderEmpList();
}

function buildFilterWeeks(){
  const sel=document.getElementById('filterWeek');
  const cur=sel.value;
  const weeks=[...new Set(requests.map(r=>r.weekStart))].sort();
  sel.innerHTML='<option value="">-- כל השבועות --</option>'+weeks.map(w=>{
    const s=new Date(w),e=new Date(w);e.setDate(e.getDate()+6);
    return `<option value="${w}"${w===cur?' selected':''}>${fmtD(s)}–${fmtD(e)}/${e.getFullYear()}</option>`;
  }).join('');
}

// ── table ─────────────────────────────────────────────────
function getFiltered(){
  const fw=document.getElementById('filterWeek').value;
  const fe=document.getElementById('filterEmp').value;
  let fil=requests;
  if(fw)fil=fil.filter(r=>r.weekStart===fw);
  if(fe)fil=fil.filter(r=>r.name===fe);
  return fil;
}

function renderTable(){
  const fil=getFiltered();
  renderSummary(fil);
  if(!fil.length){
    document.getElementById('tableArea').innerHTML='<div class="empty-state"><div class="icon">📭</div><p>אין בקשות להצגה</p></div>';
    return;
  }
  const byW={};
  fil.forEach(r=>{if(!byW[r.weekStart])byW[r.weekStart]=[];byW[r.weekStart].push(r)});
  const fe=document.getElementById('filterEmp').value;
  let html='';
  Object.keys(byW).sort().forEach(ws=>{
    const s=new Date(ws),e=new Date(ws);e.setDate(e.getDate()+6);
    const dates=Array.from({length:7},(_,i)=>{const d=new Date(ws);d.setDate(d.getDate()+i);return d});
    html+=`<div class="week-block">
      <div class="week-title">
        <span>📅 שבוע ${fmtD(s)}–${fmtD(e)}/${e.getFullYear()}</span>
        <button onclick="exportWeekExcel('${ws}')" style="background:rgba(255,255,255,0.2);color:white;border:1px solid rgba(255,255,255,0.4);border-radius:7px;padding:5px 12px;font-size:0.78rem;font-weight:600;cursor:pointer;font-family:inherit;">📊 Excel לשבוע זה</button>
      </div>
      <div style="overflow-x:auto;"><table class="schedule-table"><thead><tr>
        <th>שם</th><th>סוג</th>${dates.map((d,i)=>`<th>${DAYS[i]}<br><span style="font-weight:400;font-size:0.7rem;opacity:0.8">${fmtD(d)}</span></th>`).join('')}<th>הערות</th>
      </tr></thead><tbody>`;
    const emps=fe?[fe]:employees;
    emps.forEach(emp=>{
      const req=byW[ws].find(r=>r.name===emp);
      html+=`<tr><td class="person-cell" rowspan="2">${emp}</td><td class="type-cell">כוננות</td>`;
      dates.forEach((_,i)=>{
        const k=req?.days[i]?.konenut;
        html+=`<td>${k===1?'<span class="badge b1">כונן</span>':k===2?'<span class="badge b2">רק כונן 2</span>':k==='no'?'<span class="badge bno">לא כונן</span>':'<span class="badge be">–</span>'}</td>`;
      });
      html+=`<td rowspan="2" style="font-size:0.78rem;color:#64748b;max-width:110px;">${req?.notes||'–'}</td></tr>`;
      html+=`<tr><td class="type-cell">תגבור</td>`;
      dates.forEach((_,i)=>{
        html+=`<td>${req?.days[i]?.tigbur?'<span class="badge bt">✓ אפשרי</span>':'<span class="badge be">–</span>'}</td>`;
      });
      html+=`</tr>`;
    });
    html+=`</tbody></table></div></div>`;
  });
  document.getElementById('tableArea').innerHTML=html;
}

function renderSummary(fil){
  const k1=fil.reduce((s,r)=>s+r.days.filter(d=>d.konenut===1).length,0);
  const k2=fil.reduce((s,r)=>s+r.days.filter(d=>d.konenut===2).length,0);
  const tg=fil.reduce((s,r)=>s+r.days.filter(d=>d.tigbur).length,0);
  document.getElementById('summaryBar').innerHTML=`
    <div class="chip"><span class="num">${fil.length}</span><span class="lbl">בקשות</span></div>
    <div class="chip"><span class="num" style="color:#1d4ed8">${k1}</span><span class="lbl">ימי כונן</span></div>
    <div class="chip"><span class="num" style="color:#6d28d9">${k2}</span><span class="lbl">ימי רק כונן 2</span></div>
    <div class="chip"><span class="num" style="color:#15803d">${tg}</span><span class="lbl">ימי תגבור</span></div>`;
}

// ── Excel export ──────────────────────────────────────────
function kLabel(k){return k===1?'כונן':k===2?'רק כונן 2':k==='no'?'לא כונן':''}

function buildXlsxForWeeks(weekList){
  const wb=XLSX.utils.book_new();
  weekList.forEach(ws=>{
    const s=new Date(ws),e=new Date(ws);e.setDate(e.getDate()+6);
    const dates=Array.from({length:7},(_,i)=>{const d=new Date(ws);d.setDate(d.getDate()+i);return d});
    const sheetName=`${fmtD(s)}-${fmtD(e)}`.replace(/\//g,'.');
    const titleRow=[`סידור עבודה – שבוע ${fmtD(s)}–${fmtD(e)}/${e.getFullYear()}`];
    const hdrs2=['שם','סוג',...DAYS.map((d,i)=>`${d} ${fmtD(dates[i])}`),'הערות'];
    const aoa=[titleRow,hdrs2];
    const fe=document.getElementById('filterEmp').value;
    const empsToShow=fe?[fe]:employees;
    const weekReqs=requests.filter(r=>r.weekStart===ws);
    empsToShow.forEach(emp=>{
      const req=weekReqs.find(r=>r.name===emp);
      aoa.push([emp,'כוננות',...Array.from({length:7},(_,i)=>kLabel(req?.days[i]?.konenut)),req?.notes||'']);
      aoa.push(['','תגבור',...Array.from({length:7},(_,i)=>req?.days[i]?.tigbur?'אפשרי':''),'']);
    });
    const ws2=XLSX.utils.aoa_to_sheet(aoa);
    ws2['!cols']=[{wch:12},{wch:8},...Array(7).fill({wch:14}),{wch:20}];
    ws2['!merges']=[{s:{r:0,c:0},e:{r:0,c:9}}];
    ws2['!rows']=[{hpt:28},{hpt:22},...Array(empsToShow.length*2).fill({hpt:20})];
    XLSX.utils.book_append_sheet(wb,ws2,sheetName);
  });
  return wb;
}

function exportExcel(){
  const fw=document.getElementById('filterWeek').value;
  const weekList=fw?[fw]:[...new Set(requests.map(r=>r.weekStart))].sort();
  if(!weekList.length){showToast('אין נתונים לייצוא',true);return}
  XLSX.writeFile(buildXlsxForWeeks(weekList),fw?`sidur_${fw}.xlsx`:'sidur_all.xlsx',{bookType:'xlsx',type:'binary'});
  showToast('📊 קובץ Excel הורד!');
}

function exportWeekExcel(ws){
  XLSX.writeFile(buildXlsxForWeeks([ws]),`sidur_${ws}.xlsx`,{bookType:'xlsx',type:'binary'});
  showToast('📊 קובץ Excel הורד!');
}

function exportCSV(){
  const fil=getFiltered();
  if(!fil.length){showToast('אין נתונים לייצוא',true);return}
  const hdrs=['שם','שבוע',...DAYS.map(d=>`${d} - כוננות`),...DAYS.map(d=>`${d} - תגבור`),'הערות'];
  const rows=fil.map(r=>[r.name,r.weekStart,...r.days.map(d=>kLabel(d.konenut)),...r.days.map(d=>d.tigbur?'אפשרי':''),r.notes]);
  const csv='\uFEFF'+[hdrs,...rows].map(r=>r.map(c=>`"${c||''}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='sidur.csv';a.click();
}

// ── employee management ───────────────────────────────────
function renderEmpList(){
  document.getElementById('empList').innerHTML=employees.map(e=>`
    <div class="emp-tag">
      <button class="del-btn" onclick="confirmDeleteEmp('${e}')">✕</button>
      ${e}
    </div>`).join('');
}

function addEmployee(){
  const inp=document.getElementById('newEmpInput');
  const name=inp.value.trim();
  if(!name){showToast('❗ הכנס שם עובד',true);return}
  if(employees.includes(name)){showToast('❗ עובד זה כבר קיים',true);return}
  employees.push(name);
  inp.value='';
  renderEmpList();
  populateEmpSelects();
  saveToSheet();
  showToast(`✅ ${name} נוסף/ה בהצלחה`);
}

function confirmDeleteEmp(name){
  document.getElementById('modalTitle').textContent='הסרת עובד';
  document.getElementById('modalMsg').textContent=`האם להסיר את "${name}" מרשימת העובדים?`;
  document.getElementById('modalConfirm').onclick=()=>{deleteEmp(name);closeModal()};
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open')}
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});

function deleteEmp(name){
  employees=employees.filter(e=>e!==name);
  renderEmpList();
  populateEmpSelects();
  saveToSheet();
  showToast(`🗑️ ${name} הוסר/ה`);
}

// ── toast ─────────────────────────────────────────────────
function showToast(msg,err=false){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.background=err?'#dc2626':'#16a34a';
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);
}
</script>
